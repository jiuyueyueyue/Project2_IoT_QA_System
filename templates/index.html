<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电商智能客服 NLU 意图识别引擎</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>电商智能客服 NLU 意图识别引擎</h1>
      <p class="subtitle">
        对标京小智/飞鸽 · 多标签意图分类 · 自动路由分发
      </p>
      <div class="version-info">
        版本: <span id="api-version">加载中...</span> |
        模型状态: <span id="model-status" class="status-loading">检查中...</span>
      </div>
    </header>

    <main class="card">
      <!-- 阈值调节 -->
      <div class="threshold-control">
        <label for="threshold" class="label">意图置信度阈值</label>
        <div class="threshold-slider">
          <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.3" />
          <span class="threshold-value">0.3</span>
        </div>
        <p class="threshold-hint">值越低返回越多的潜在意图，值越高越精准</p>
      </div>

      <form id="qa-form" autocomplete="off">
        <label for="text" class="label">请输入用户消息</label>
        <textarea
          id="text"
          name="text"
          rows="4"
          placeholder="例：我的订单什么时候发货？这个能退货吗？"
          maxlength="500"
        ></textarea>
        <div class="char-count">
          <span id="char-count">0</span> / 500
        </div>
        <div class="actions">
          <button type="submit" id="submit-btn">识别意图</button>
          <button type="button" id="reset-btn" class="secondary">清空</button>
        </div>
      </form>

      <section id="result" class="result hidden">
        <div class="result-header">
          <h2>意图识别结果</h2>
          <span class="result-count" id="result-count">0 个意图</span>
        </div>
        <p class="hint" id="query-echo"></p>
        <ul id="result-list" class="result-list"></ul>
      </section>

      <section id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
        <span>正在识别意图，请稍候…</span>
      </section>

      <section id="error-box" class="error hidden"></section>
    </main>

    <footer class="footer">
      <span>电商智能客服 NLU 意图识别引擎 · 企业级工程重构版 · 对标京小智/飞鸽</span>
    </footer>
  </div>

  <script>
    const form = document.getElementById('qa-form');
    const textInput = document.getElementById('text');
    const submitBtn = document.getElementById('submit-btn');
    const resetBtn = document.getElementById('reset-btn');
    const resultBox = document.getElementById('result');
    const resultList = document.getElementById('result-list');
    const echoEl = document.getElementById('query-echo');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error-box');
    const thresholdInput = document.getElementById('threshold');
    const thresholdValue = document.querySelector('.threshold-value');
    const charCount = document.getElementById('char-count');
    const apiVersion = document.getElementById('api-version');
    const modelStatus = document.getElementById('model-status');

    function show(node) { node.classList.remove('hidden'); }
    function hide(node) { node.classList.add('hidden'); }

    // 阈值调节
    thresholdInput.addEventListener('input', (e) => {
      thresholdValue.textContent = e.target.value;
    });

    // 字符计数
    textInput.addEventListener('input', (e) => {
      charCount.textContent = e.target.value.length;
    });

    // 清空按钮
    resetBtn.addEventListener('click', () => {
      textInput.value = '';
      charCount.textContent = '0';
      hide(resultBox);
      hide(loading);
      hide(errorBox);
    });

    // 健康检查
    async function checkHealth() {
      try {
        const resp = await fetch('/api/health');
        const data = await resp.json();
        apiVersion.textContent = data.version || '未知';

        if (data.model_loaded) {
          modelStatus.textContent = '已加载 (' + (data.n_labels || 0) + ' 类意图)';
          modelStatus.className = 'status-ok';
        } else {
          modelStatus.textContent = '未加载';
          modelStatus.className = 'status-error';
          errorBox.textContent = '模型未加载，请先运行 python main.py train';
          show(errorBox);
        }
      } catch (err) {
        apiVersion.textContent = '无法连接';
        modelStatus.textContent = '离线';
        modelStatus.className = 'status-error';
      }
    }

    checkHealth();

    // 表单提交
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = textInput.value.trim();
      const threshold = parseFloat(thresholdInput.value);

      if (!text) {
        errorBox.textContent = '请输入用户消息';
        show(errorBox);
        return;
      }

      hide(errorBox);
      show(loading);
      submitBtn.disabled = true;

      try {
        const resp = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, threshold })
        });
        const payload = await resp.json();
        hide(loading);
        submitBtn.disabled = false;

        if (payload.code !== 0) {
          errorBox.textContent = payload.msg || '请求失败';
          show(errorBox);
          return;
        }

        renderResults(text, payload.data || [], threshold);
      } catch (err) {
        hide(loading);
        submitBtn.disabled = false;
        errorBox.textContent = '网络异常：' + err.message;
        show(errorBox);
      }
    });

    // 路由颜色映射
    function getRouteClass(route) {
      const map = {
        'rag_qa': 'route-rag',
        'order_api': 'route-api',
        'logistics_api': 'route-api',
        'ticket_system': 'route-ticket',
        'human_agent': 'route-human',
        'fallback': 'route-fallback',
      };
      return map[route] || 'route-fallback';
    }

    function getRouteLabel(route) {
      const map = {
        'rag_qa': 'RAG 问答',
        'order_api': '订单 API',
        'logistics_api': '物流 API',
        'ticket_system': '售后工单',
        'human_agent': '转人工',
        'fallback': '兜底',
      };
      return map[route] || route;
    }

    // 渲染结果
    function renderResults(query, items, threshold) {
      echoEl.textContent = `用户消息：${query}`;
      document.getElementById('result-count').textContent = `${items.length} 个意图`;
      resultList.innerHTML = '';

      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'result-item';
        li.style.animationDelay = `${index * 0.1}s`;

        const header = document.createElement('div');
        header.className = 'result-header';

        const rank = document.createElement('span');
        rank.className = 'rank';
        rank.textContent = `#${index + 1}`;

        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = item.label;

        const score = document.createElement('span');
        score.className = 'score';
        const scorePercent = (item.score * 100).toFixed(1);
        score.textContent = `${scorePercent}%`;

        // 置信度进度条
        const scoreBar = document.createElement('div');
        scoreBar.className = 'score-bar';

        const scoreFill = document.createElement('div');
        scoreFill.className = 'score-fill';
        scoreFill.style.width = `${scorePercent}%`;

        if (item.score >= 0.8) {
          scoreFill.className = 'score-fill score-high';
        } else if (item.score >= 0.5) {
          scoreFill.className = 'score-fill score-medium';
        } else {
          scoreFill.className = 'score-fill score-low';
        }

        scoreBar.appendChild(scoreFill);

        header.appendChild(rank);
        header.appendChild(tag);
        header.appendChild(score);

        const scoreBarContainer = document.createElement('div');
        scoreBarContainer.className = 'score-bar-container';
        scoreBarContainer.appendChild(scoreBar);

        // 路由信息
        const action = item.action || {};
        const routeDiv = document.createElement('div');
        routeDiv.className = 'route-info';

        const routeBadge = document.createElement('span');
        routeBadge.className = 'route-badge ' + getRouteClass(action.route);
        routeBadge.textContent = getRouteLabel(action.route);

        const routeTarget = document.createElement('span');
        routeTarget.className = 'route-target';
        routeTarget.textContent = ' → ' + (action.target || 'N/A');

        const routeDesc = document.createElement('p');
        routeDesc.className = 'route-desc';
        routeDesc.textContent = action.description || '';

        routeDiv.appendChild(routeBadge);
        routeDiv.appendChild(routeTarget);

        li.appendChild(header);
        li.appendChild(scoreBarContainer);
        li.appendChild(routeDiv);
        if (action.description) {
          li.appendChild(routeDesc);
        }
        resultList.appendChild(li);
      });

      show(resultBox);
    }
  </script>
</body>
</html>
